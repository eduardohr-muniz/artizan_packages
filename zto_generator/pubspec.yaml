name: zto_generator
description: build_runner code generator for zto — generates ZtoSchema constants
  and validated fromMap functions from @Dto-annotated classes.
version: 0.1.0
publish_to: none

environment:
  sdk: ^3.6.0

dependencies:
  analyzer: ^7.0.0
  build: ^2.4.0
  source_gen: ^2.0.0
  zto:
    path: ../zto

dev_dependencies:
  build_runner_core: ^9.1.0
  build_test: ^3.2.1
  lints: ^6.0.0
  test: ^1.25.0

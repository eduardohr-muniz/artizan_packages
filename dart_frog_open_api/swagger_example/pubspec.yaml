name: swagger_example
description: Example Dart Frog app demonstrating dart_frog_open_api integration.
version: 1.0.0+1
publish_to: none

environment:
  sdk: ^3.6.0

dependencies:
  dart_frog: ^1.1.0
  zto:
    path: ../../zto
  dart_frog_open_api:
    path: ../

dev_dependencies:
  build_runner: ^2.4.0
  dart_frog_lint: ^0.1.0
  mocktail: ^1.0.3
  test: ^1.25.5
  zto_generator:
    path: ../../zto_generator
